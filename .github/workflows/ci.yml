name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: syllabus_test
          POSTGRES_USER: syllabus_user
          POSTGRES_PASSWORD: syllabus_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U syllabus_user -d syllabus_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://syllabus_user:syllabus_password@localhost:5432/syllabus_test
      CACHE_URL: redis://localhost:6379/1
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/0
      CELERY_TASK_ALWAYS_EAGER: "1"
      CELERY_TASK_EAGER_PROPAGATES: "1"
      SECRET_KEY: ci-secret-key-syllabus-generator-2026
      DEBUG: "0"
      ALLOWED_HOSTS: localhost,127.0.0.1,testserver
    defaults:
      run:
        working-directory: Backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: Backend/requirements.txt
      - name: Install WeasyPrint system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0 libharfbuzz0b libcairo2 libgdk-pixbuf-2.0-0
      - run: pip install -r requirements.txt
      - run: python manage.py migrate --noinput
      - run: python manage.py check
      - run: pytest --cov=accounts --cov=syllabuses --cov-report=term-missing

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
