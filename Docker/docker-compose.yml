services:
  postgres:
    image: postgres:16
    container_name: syllabus_postgres
    environment:
      POSTGRES_DB: syllabus_db
      POSTGRES_USER: syllabus_user
      POSTGRES_PASSWORD: syllabus_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U syllabus_user -d syllabus_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: syllabus_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ..
      dockerfile: Docker/Backend/Dockerfile
    container_name: syllabus_backend
    command: >
      sh -c "python manage.py migrate &&
            python manage.py seed_syllabuses &&
            python manage.py runserver 0.0.0.0:8000"
    env_file:
      - ../Backend/.env
    environment:
      DEBUG: "1"
      DATABASE_URL: postgres://syllabus_user:syllabus_password@postgres:5432/syllabus_db
      SECRET_KEY: dev-secret-key-syllabus-generator-2026
      ALLOWED_HOSTS: localhost,127.0.0.1,backend
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      CACHE_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - ../Backend:/app
      - backend_media:/app/media
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build:
      context: ..
      dockerfile: Docker/Backend/Dockerfile
    container_name: syllabus_celery
    command: celery -A syllabus_generator_system worker --loglevel=info
    env_file:
      - ../Backend/.env
    environment:
      DEBUG: "1"
      DATABASE_URL: postgres://syllabus_user:syllabus_password@postgres:5432/syllabus_db
      SECRET_KEY: dev-secret-key-syllabus-generator-2026
      ALLOWED_HOSTS: localhost,127.0.0.1,backend
      CACHE_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - ../Backend:/app
      - backend_media:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ..
      dockerfile: Docker/Frontend/Dockerfile
    container_name: syllabus_frontend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      NUXT_PUBLIC_API_URL: http://localhost:8000/api
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "1000"
      WATCHPACK_POLLING: "true"
      NUXT_HOST: 0.0.0.0
      NUXT_PORT: 3000
    volumes:
      - ../Frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_media:
  redis_data:
